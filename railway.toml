[build]
# --force bypasses stale Turbo/Railpack cache that can skip workspace package builds
buildCommand = "pnpm turbo build --filter=@parksafe/types --filter=@parksafe/db --filter=@parksafe/api --force"

[deploy]
# Rebuild shared packages at start as a safety net (fast, ~2s)
startCommand = "pnpm turbo build --filter=@parksafe/types --filter=@parksafe/db --force && pnpm --filter @parksafe/api start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
